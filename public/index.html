<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailShelf — Railway Book Collection</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">
<!-- Header -->
<header class="bg-slate-900 text-white">
  <div class="max-w-6xl mx-auto px-4 py-6 sm:px-6 sm:py-8">
    <div class="flex items-center gap-3">
      <span class="text-3xl" aria-hidden="true"></span>
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">
          RailShelf
        </h1>
        <p class="text-slate-300 text-sm sm:text-base mt-1">
          Railway Book Collection Tracker
        </p>
      </div>
    </div>
  </div>
</header>

<!-- Search Bar -->
<section class="bg-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-4 sm:px-6">
    <div class="flex flex-col sm:flex-row gap-3">
      <input
              type="text"
              placeholder="Search by title, author, or ISBN…"
              class="flex-1 px-4 py-2 rounded-lg bg-slate-700 text-white placeholder-slate-400 border border-slate-600 focus:outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"
      />
      <select
              class="px-4 py-2 rounded-lg bg-slate-700 text-white border border-slate-600 focus:outline-none focus:border-sky-400"
      >
        <option value="">All Categories</option>
        <option value="history">History</option>
        <option value="signalling">Signalling</option>
        <option value="photography">Photography</option>
        <option value="infrastructure">Infrastructure</option>
      </select>
    </div>
  </div>
</section>

<!-- Stats Bar -->
<section id="stats" class="bg-white border-b border-slate-200">
  <div
          class="max-w-6xl mx-auto px-4 py-3 sm:px-6 flex flex-wrap gap-4 text-sm text-slate-700"
  >
    <span>Loading…</span>
  </div>
</section>

<!-- Book Cards -->
<main class="max-w-6xl mx-auto px-4 py-6 sm:px-6 sm:py-8">
  <div
          id="book-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"
  ></div>
</main>

<!-- Footer -->
<footer class="bg-slate-900 text-slate-400 text-center text-sm py-4 mt-8">
  RailShelf — COM5409 Web Design &amp; Programming
</footer>

<script>
  const statusConfig = {
    owned: {
      label: "Owned",
      classes: "bg-green-100 text-green-700",
    },
    wishlist: {
      label: "Wishlist",
      classes: "bg-amber-100 text-amber-700",
    },
    "lent out": {
      label: "Lent Out",
      classes: "bg-red-100 text-red-700",
    },
  };

  function createBookCard(book) {
    const status = statusConfig[book.status] || statusConfig["owned"];

    return `
          <article class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
            <div class="bg-slate-700 px-4 py-2">
              <span class="text-xs font-semibold text-slate-200 uppercase tracking-wide">${book.category}</span>
            </div>
            <div class="p-4 sm:p-5">
              <h2 class="font-bold text-slate-900 text-lg leading-snug">
                ${book.title}
              </h2>
              <p class="text-slate-600 text-sm mt-1">${book.author}</p>
              <dl class="mt-3 space-y-1 text-sm text-slate-700">
                <div class="flex justify-between">
                  <dt class="font-medium">ISBN</dt>
                  <dd class="text-slate-500 font-mono text-xs self-center">${book.isbn}</dd>
                </div>
                <div class="flex justify-between">
                  <dt class="font-medium">Publisher</dt>
                  <dd class="text-slate-500">${book.publisher}</dd>
                </div>
                <div class="flex justify-between">
                  <dt class="font-medium">Year</dt>
                  <dd class="text-slate-500">${book.year}</dd>
                </div>
              </dl>
              <div class="mt-4">
                <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full ${status.classes}">
                  ${status.label}
                </span>
              </div>
            </div>
          </article>
        `;
  }

  function renderStats(books) {
    const total = books.length;
    const owned = books.filter((b) => b.status === "owned").length;
    const wishlist = books.filter((b) => b.status === "wishlist").length;
    const lent = books.filter((b) => b.status === "lent out").length;

    document.querySelector("#stats > div").innerHTML = `
          <span><strong>${total}</strong> books</span>
          <span><strong>${owned}</strong> owned</span>
          <span><strong>${wishlist}</strong> wishlist</span>
          <span><strong>${lent}</strong> lent out</span>
        `;
  }

  async function loadBooks() {
    const response = await fetch("/api/books");
    const books = await response.json();

    const grid = document.getElementById("book-grid");
    grid.innerHTML = books.map(createBookCard).join("");

    renderStats(books);
  }

  loadBooks();
</script>
</body>
</html>
